  <script>
  // ── shared ──────────────────────────────────────────────────────────────
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  let W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const BOX      = 500;
  const FOV      = 320;
  const CAM_TILT = 0.15;
  const CAM_SPIN = 0.0018;
  const cosTilt  = Math.cos(CAM_TILT);
  const sinTilt  = Math.sin(CAM_TILT);
  let   camAngle = 0;

  // single-hue palette — cold steel blue
  const HUE = 212;
  const SAT = 22; // low saturation → desaturated, inorganic

  // directional light (world space, normalized)
  const _l  = { x:0.5, y:-0.68, z:0.35 };
  const _ll = Math.sqrt(_l.x**2+_l.y**2+_l.z**2);
  const LIGHT = { x:_l.x/_ll, y:_l.y/_ll, z:_l.z/_ll };

  let lightSX = 0, lightSY = 0;
  function updateLightScreen() {
    const cosA=Math.cos(camAngle), sinA=Math.sin(camAngle);
    const lrx= LIGHT.x*cosA + LIGHT.z*sinA;
    const lrz=-LIGHT.x*sinA + LIGHT.z*cosA;
    const ltx= lrx;
    const lty= LIGHT.y*cosTilt - lrz*sinTilt;
    const len= Math.sqrt(ltx*ltx+lty*lty)||1;
    lightSX=ltx/len; lightSY=lty/len;
  }

  function project(x, y, z) {
    const cosA=Math.cos(camAngle), sinA=Math.sin(camAngle);
    const rx= x*cosA + z*sinA;
    const ry= y;
    const rz=-x*sinA + z*cosA;
    const ty= ry*cosTilt - rz*sinTilt;
    const tz= ry*sinTilt + rz*cosTilt;
    const near = FOV - 30;               // near clip plane
    if (tz < -near) return { s: 0, tz }; // behind / too close → skip
    const s = FOV / (FOV + tz);
    // fade very close particles to avoid giant blobs
    const nearFade = Math.min(1, (tz + near) / 80);
    return { sx: W*0.5+rx*s, sy: H*0.5+ty*s, s: s * nearFade, tz };
  }

  // draw a lit sphere-dot — monochrome, lighting from LIGHT direction
  function drawDot(sx, sy, s, vx, vy, vz) {
    const spd = Math.sqrt(vx*vx+vy*vy+vz*vz)||1;
    const diff = Math.max(0, (vx/spd)*LIGHT.x + (vy/spd)*LIGHT.y + (vz/spd)*LIGHT.z);
    const lit  = 0.36 + 0.64*diff;

    const r  = Math.min(9,  Math.max(0.5, 2.4*s));
    const gr = Math.min(52, Math.max(1,  10*s));

    // asymmetric glow (center shifted toward light)
    const off = 4.5*s;
    const grd = ctx.createRadialGradient(sx+lightSX*off, sy+lightSY*off, 0, sx, sy, gr);
    const lv  = Math.round(52*lit);
    grd.addColorStop(0, `hsla(${HUE},${SAT}%,${lv}%,${0.3*s})`);
    grd.addColorStop(1, `hsla(${HUE},${SAT}%,${lv}%,0)`);
    ctx.beginPath(); ctx.arc(sx, sy, gr, 0, Math.PI*2);
    ctx.fillStyle=grd; ctx.fill();

    // core
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
    ctx.fillStyle=`hsla(${HUE},${SAT+6}%,${Math.round(60*lit+15)}%,${Math.min(1,s*1.5)})`;
    ctx.fill();

    // specular — stays white, small dot offset toward light
    if (diff > 0.42) {
      const sp=(diff-0.42)/0.58;
      ctx.beginPath();
      ctx.arc(sx+lightSX*r*0.42, sy+lightSY*r*0.42, r*0.35, 0, Math.PI*2);
      ctx.fillStyle=`rgba(235,240,250,${sp*0.5})`;
      ctx.fill();
    }
  }

  // ── Particle Life ────────────────────────────────────────────────────────
  const PL_SP=5, PL_N=44, PL_RMAX=90, PL_FR=0.87, PL_F=11, PL_ER=55;
  const PL_A=Array.from({length:PL_SP},(_,i)=>Array.from({length:PL_SP},(_,j)=>
    i===j ? 0.25+Math.random()*0.45 : Math.random()*1.8-0.9
  ));
  function plForce(r,a) {
    const β=0.3;
    if(r<β) return r/β-1;
    if(r<1) return a*(1-Math.abs(2*(r-β)/(1-β)-1));
    return 0;
  }
  class Particle {
    constructor(sp) {
      this.sp=sp;
      this.x=(Math.random()-.5)*BOX*1.6; this.y=(Math.random()-.5)*BOX*1.6; this.z=(Math.random()-.5)*BOX*1.6;
      this.vx=0;this.vy=0;this.vz=0;
    }
  }
  const particles=[];
  for(let s=0;s<PL_SP;s++) for(let i=0;i<PL_N;i++) particles.push(new Particle(s));

  function stepParticles() {
    for (const p of particles) {
      let fx=0,fy=0,fz=0;
      for (const q of particles) {
        if(q===p) continue;
        const dx=q.x-p.x,dy=q.y-p.y,dz=q.z-p.z;
        const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
        if(d===0||d>PL_RMAX) continue;
        const f=plForce(d/PL_RMAX,PL_A[p.sp][q.sp])*PL_F/d;
        fx+=dx*f;fy+=dy*f;fz+=dz*f;
      }
      p.vx=(p.vx+fx)*PL_FR; p.vy=(p.vy+fy)*PL_FR; p.vz=(p.vz+fz)*PL_FR;
      p.x+=p.vx;p.y+=p.vy;p.z+=p.vz;
      if(p.x<-BOX)p.x+=BOX*2;if(p.x>BOX)p.x-=BOX*2;
      if(p.y<-BOX)p.y+=BOX*2;if(p.y>BOX)p.y-=BOX*2;
      if(p.z<-BOX)p.z+=BOX*2;if(p.z>BOX)p.z-=BOX*2;
    }
    const pts=particles.map(p=>({p,...project(p.x,p.y,p.z)})).sort((a,b)=>b.tz-a.tz);
    ctx.lineWidth=0.4;
    for (let i=0;i<pts.length;i++) {
      for (let j=i+1;j<pts.length;j++) {
        if(pts[i].p.sp!==pts[j].p.sp) continue;
        const A=pts[i],B=pts[j];
        const dx=A.p.x-B.p.x,dy=A.p.y-B.p.y,dz=A.p.z-B.p.z;
        const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
        if(d>PL_ER) continue;
        const t=(1-d/PL_ER)*Math.min(A.s,B.s);
        ctx.beginPath();ctx.moveTo(A.sx,A.sy);ctx.lineTo(B.sx,B.sy);
        ctx.strokeStyle=`hsla(${HUE},${SAT}%,55%,${t*0.22})`;ctx.stroke();
      }
    }
    for (const {p,sx,sy,s} of pts) { if(s>0) drawDot(sx,sy,s,p.vx,p.vy,p.vz); }
  }

  // ── loop ──────────────────────────────────────────────────────────────────
  function loop() {
    camAngle+=CAM_SPIN;
    updateLightScreen();
    ctx.fillStyle='rgba(15,19,24,0.27)';
    ctx.fillRect(0,0,W,H);
    stepParticles();
    requestAnimationFrame(loop);
  }
  loop();
  </script>
