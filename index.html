<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>hjjjsn</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #c8f542;
      --text: #f0f0f0;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
    }

    /* header */
    .header {
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease both;
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.4rem, 10vw, 3.5rem);
      line-height: 1.2;
      letter-spacing: -0.03em;
      color: var(--text);
      padding-bottom: 0.1em;
      overflow: visible;
    }

    .name span {
      color: var(--accent);
    }

    .divider {
      width: 40px;
      height: 3px;
      background: var(--accent);
      margin: 1rem 0 0.75rem;
      border-radius: 2px;
    }

    .tagline {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      animation: fadeUp 0.6s ease both;
      position: relative;
      overflow: hidden;
    }

    .link-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 0;
    }

    .link-item:hover {
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .link-item:hover::after {
      opacity: 0.04;
    }

    .link-item > * { position: relative; z-index: 1; }

    .icon-wrap {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-wrap svg {
      width: 20px;
      height: 20px;
      fill: var(--muted);
      transition: fill 0.2s;
    }

    .link-item:hover .icon-wrap svg {
      fill: var(--accent);
    }

    .link-info {
      flex: 1;
      min-width: 0;
    }

    .link-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }

    .link-handle {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .arrow {
      color: var(--muted);
      font-size: 0.9rem;
      transition: color 0.2s, transform 0.2s;
    }

    .link-item:hover .arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    /* discord special (no link) */
    .discord-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      animation: fadeUp 0.6s ease both;
      cursor: default;
    }

    .discord-badge {
      font-size: 0.65rem;
      background: #1a1a1a;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* footer */
    .footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.68rem;
      color: #333;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: fadeUp 0.6s ease 0.8s both;
    }

    /* animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .link-item:nth-child(1) { animation-delay: 0.1s; }
    .link-item:nth-child(2) { animation-delay: 0.18s; }
    .link-item:nth-child(3) { animation-delay: 0.26s; }
    .link-item:nth-child(4) { animation-delay: 0.34s; }
    .link-item:nth-child(5) { animation-delay: 0.42s; }
    .discord-item           { animation-delay: 0.50s; }
  </style>
</head>
